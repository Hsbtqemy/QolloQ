{% load static %}<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Proposition retirée — {{ event.name }}</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}?v=2">
</head>
<body>
<div class="public-layout">
  <header class="public-header">
    <span class="public-brand">QolloQ</span>
    <span class="public-event-name">{{ event.name }}</span>
  </header>
  <main class="public-main">
    <div class="public-card" style="text-align:center">
      <h1>Proposition retirée</h1>
      <p class="text-muted">Votre proposition a bien été supprimée.</p>
      <p><a href="{% url 'submissions:public_submit' event_slug=event.slug %}" class="btn ghost">Soumettre une nouvelle proposition</a></p>
    </div>
  </main>
</div>
</body>
</html>

{# Bouton préférences d'affichage — inclus dans .sidebar-footer #}
<div x-data="{ open: false, pos: { bottom: '0', left: '0' } }">

  <button type="button" class="prefs-btn" x-ref="toggle"
          @click="
            var r = $el.getBoundingClientRect();
            pos = { bottom: (window.innerHeight - r.top + 10) + 'px',
                    left:   (r.left) + 'px' };
            open = !open
          "
          :aria-expanded="open.toString()"
          aria-label="Préférences d'affichage">
    <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
      <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
    </svg>
    Affichage
  </button>

  <template x-teleport="body">
    <div x-show="open" x-cloak
         @click.outside="if (!$refs.toggle.contains($event.target)) open = false"
         @keydown.escape.window="open = false"
         :style="'position:fixed;bottom:'+pos.bottom+';left:'+pos.left+';z-index:600'"
         class="prefs-panel"
         role="dialog" aria-label="Préférences d'affichage">

      <div class="prefs-row">
        <span class="prefs-label">Thème</span>
        <div class="prefs-pills">
          <button type="button" class="prefs-pill"
                  :class="{ active: $store.prefs.theme === 'clair' }"
                  @click="$store.prefs.setTheme('clair')">☀ Clair</button>
          <button type="button" class="prefs-pill"
                  :class="{ active: $store.prefs.theme === 'sombre' }"
                  @click="$store.prefs.setTheme('sombre')">🌙 Sombre</button>
        </div>
      </div>

      <div class="prefs-row">
        <span class="prefs-label">Contraste</span>
        <div class="prefs-pills">
          <button type="button" class="prefs-pill"
                  :class="{ active: $store.prefs.contrast === 'normal' }"
                  @click="$store.prefs.setContrast('normal')">Normal</button>
          <button type="button" class="prefs-pill"
                  :class="{ active: $store.prefs.contrast === 'eleve' }"
                  @click="$store.prefs.setContrast('eleve')">Élevé</button>
        </div>
      </div>

      <div class="prefs-row">
        <span class="prefs-label">Zoom</span>
        <div class="prefs-pills">
          <button type="button" class="prefs-pill"
                  :class="{ active: $store.prefs.zoom === '100' }"
                  @click="$store.prefs.setZoom('100')">100%</button>
          <button type="button" class="prefs-pill"
                  :class="{ active: $store.prefs.zoom === '125' }"
                  @click="$store.prefs.setZoom('125')">125%</button>
          <button type="button" class="prefs-pill"
                  :class="{ active: $store.prefs.zoom === '150' }"
                  @click="$store.prefs.setZoom('150')">150%</button>
        </div>
      </div>

    </div>
  </template>

</div>

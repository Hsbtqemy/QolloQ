<!DOCTYPE html>
<html lang="fr">
<head><meta charset="utf-8"></head>
<body style="font-family:sans-serif;font-size:15px;color:#1a1a1a;max-width:560px;margin:0 auto;padding:2rem 1rem">
{{ email_body_fr|linebreaks }}
<p style="margin:1.5rem 0">
  <a href="{{ eval_link }}"
     style="display:inline-block;padding:.6rem 1.2rem;background:#2563eb;color:#fff;border-radius:6px;text-decoration:none;font-weight:600">
    Accéder aux propositions
  </a>
</p>
{% if is_bilingual and email_body_en %}
<hr style="border:none;border-top:1px solid #e5e7eb;margin:1.5rem 0">
{{ email_body_en|linebreaks }}
<p style="margin:1.5rem 0">
  <a href="{{ eval_link }}"
     style="display:inline-block;padding:.6rem 1.2rem;background:#2563eb;color:#fff;border-radius:6px;text-decoration:none;font-weight:600">
    Access proposals
  </a>
</p>
{% endif %}
</body>
</html>

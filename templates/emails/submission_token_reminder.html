<!doctype html>
<html lang="fr">
<head><meta charset="utf-8"></head>
<body style="font-family:sans-serif;color:#111;max-width:600px;margin:0 auto;padding:24px;">
{{ email_body_fr|linebreaks }}
<p style="margin:24px 0;">
  <a href="{{ token_url }}"
     style="background:#2563eb;color:#fff;text-decoration:none;padding:10px 20px;border-radius:6px;display:inline-block;">
    Accéder à ma soumission
  </a>
</p>
<p style="font-size:.85em;color:#6b7280;">Ou copiez ce lien dans votre navigateur :<br>{{ token_url }}</p>
{% if is_bilingual and email_body_en %}
<hr style="border:none;border-top:1px solid #e5e7eb;margin:24px 0">
{{ email_body_en|linebreaks }}
<p style="margin:24px 0;">
  <a href="{{ token_url }}"
     style="background:#2563eb;color:#fff;text-decoration:none;padding:10px 20px;border-radius:6px;display:inline-block;">
    Access my submission
  </a>
</p>
<p style="font-size:.85em;color:#6b7280;">Or copy this link into your browser:<br>{{ token_url }}</p>
{% endif %}
</body>
</html>

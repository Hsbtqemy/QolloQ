# /etc/nginx/sites-available/qolloq
# Sans domaine : server_name = IP du serveur.
# Avec domaine : remplacer l'IP par le nom de domaine, puis lancer certbot.
#
# Prérequis : sudo chmod o+x /home/qolloq

server {
    listen 80;
    server_name 83.228.221.204;  # Remplacer par le domaine une fois disponible

    client_max_body_size 20M;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /static/ {
        alias /home/qolloq/qolloq/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /home/qolloq/qolloq/media/;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/home/qolloq/qolloq/qolloq.sock;
    }
}

# --- Une fois le domaine pointé, lancer : ---
# sudo certbot --nginx -d qolloq.exemple.fr
# Certbot génère automatiquement le bloc HTTPS et le redirect 80 → 443.
# Puis dans .env : SESSION_COOKIE_SECURE=True et CSRF_COOKIE_SECURE=True

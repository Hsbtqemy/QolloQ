# /etc/nginx/sites-available/qolloq
# Remplacer DOMAINE par le nom de domaine réel avant d'activer HTTPS.
# En attendant : accès direct via IP ou sous-domaine sans SSL.

upstream qolloq {
    server unix:/run/qolloq/qolloq.sock fail_timeout=0;
}

server {
    listen 80;
    server_name _;  # Remplacer par le domaine : server_name qolloq.exemple.fr;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/qolloq/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/qolloq/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://qolloq;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }
}

